Description: Creates daily Wordle threads in a Signal channel

Parameters:
  AMI:
    Type: String
    Description: The AMI ID to use
    Default: "resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64"
  InstanceType:
    Type: String
    Description: EC2 instance type
    Default: t2.micro

Mappings:
  # EC2 Instance Connect CIDR IP ranges
  # curl -s https://ip-ranges.amazonaws.com/ip-ranges.json | \
  #   jq -r '.prefixes[] | select(.service=="EC2_INSTANCE_CONNECT" and .region=="us-west-2") | .ip_prefix'
  EC2InstanceConnect:
    us-east-1:
      CidrIp: 18.206.107.24/29
    us-west-2:
      CidrIp: 18.237.140.160/29

Resources:
  DataBucket:
    Type: AWS::S3::Bucket

  DailyThreadLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${DailyThreadLambda}"
      RetentionInDays: 30

  DailyThreadLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
        - Effect: Allow
          Action: sts:AssumeRole
          Principal:
            Service: lambda.amazonaws.com
      ManagedPolicyArns:
      - !Sub "arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
      Policies:
      - PolicyName: LetCfnManageLogGroups
        PolicyDocument:
          Statement:
          - Effect: Deny
            Action: logs:CreateLogGroup
            Resource: "*"
      - PolicyName: DataBucketAccess
        PolicyDocument:
          Statement:
          - Effect: Allow
            Action:
            - s3:GetObject
            - s3:PutObject
            Resource: !Sub "${DataBucket.Arn}/*"
      - PolicyName: SSMPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ssm:SendCommand
                - ssm:GetCommandInvocation
                - ssm:ListCommandInvocations
              Resource: "*"
            - Effect: Allow
              Action: ssm:GetParameter
              Resource:
                - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/destination"
                - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/signal/*"

  DailyThreadScheduleRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
        - Effect: Allow
          Action: sts:AssumeRole
          Principal:
            Service: scheduler.amazonaws.com
      Policies:
      - PolicyName: LambdaInvokePolicy
        PolicyDocument:
          Statement:
          - Effect: Allow
            Action: lambda:InvokeFunction
            Resource: !GetAtt DailyThreadLambda.Arn

  DailyThreadSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      FlexibleTimeWindow:
        Mode: 'OFF'
      ScheduleExpression: 'cron(0 1 ? * * *)'
      ScheduleExpressionTimezone: 'America/Los_Angeles'
      State: ENABLED
      Target:
        Arn: !GetAtt DailyThreadLambda.Arn
        RoleArn: !GetAtt DailyThreadScheduleRole.Arn

  DailyThreadLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: gen_word.handler
      Runtime: python3.12
      Role: !GetAtt DailyThreadLambdaRole.Arn
      Timeout: 30
      Environment:
        Variables:
          S3_BUCKET: !Ref DataBucket
          SIGNAL_SENDER_DOCUMENT_NAME: !Ref SendWordToSignalDocument
      Code:
        # Code will be updated with a separate script
        ZipFile: 'def handler(event, context): pass'

  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.1.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      InstanceTenancy: default

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VpcInternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Sub ${AWS::Region}a
      CidrBlock: 10.1.1.0/24
      MapPublicIpOnLaunch: false

  PublicSubnetRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicSubnetRouteTable
      SubnetId: !Ref PublicSubnet

  PublicSubnetRouteToInternet:
    Type: AWS::EC2::Route
    DependsOn: VpcInternetGatewayAttachment
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      RouteTableId: !Ref PublicSubnetRouteTable
      GatewayId: !Ref InternetGateway

  PublicSubnetSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for PublicSubnet
      VpcId: !Ref Vpc
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !FindInMap [EC2InstanceConnect, !Ref "AWS::Region", CidrIp]

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
        - Effect: Allow
          Action: sts:AssumeRole
          Principal:
            Service: ec2.amazonaws.com
      ManagedPolicyArns:
      - !Sub "arn:${AWS::Partition}:iam::aws:policy/AmazonSSMManagedInstanceCore"

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: "/"
      Roles:
      - !Ref InstanceRole

  DestinationParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /destination
      Type: String
      Value: "signal"

  SignalAccountParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /signal/account
      Type: String
      Value: "placeholder"

  SignalGroupIdParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /signal/groupId
      Type: String
      Value: "placeholder"

  SignalMessageSenderLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref AMI
        NetworkInterfaces:
          - DeviceIndex: 0
            AssociatePublicIpAddress: true
            Groups:
              - !Ref PublicSubnetSecurityGroup
        IamInstanceProfile:
          Name: !Ref InstanceProfile
        InstanceType: !Ref InstanceType
        UserData:
          # Bootstrap logs: /var/log/cloud-init-output.log
          Fn::Base64:
            !Sub |
            #!/bin/bash -xe
            cat > /etc/profile.d/load_env.sh << 'EOF'
            export AWS_DEFAULT_REGION=${AWS::Region}
            EOF

            yum update -y
            yum install -y ec2-instance-connect

            cd /tmp
            yum install -y java-21
            curl -L -O "https://github.com/AsamK/signal-cli/releases/download/v0.13.22/signal-cli-0.13.22.tar.gz"
            sudo tar zxf "signal-cli-0.13.22.tar.gz" -C /opt
            sudo ln -sf "/opt/signal-cli-0.13.22/bin/signal-cli" /usr/local/bin/

  SignalMessageSenderAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      MaxSize: 1
      MinSize: 1
      DesiredCapacity: 1
      LaunchTemplate:
        LaunchTemplateId: !Ref SignalMessageSenderLaunchTemplate
        Version: !GetAtt SignalMessageSenderLaunchTemplate.LatestVersionNumber
      VPCZoneIdentifier:
        - !Ref PublicSubnet
      Tags:
        - Key: Name
          Value: signal-message-sender
          PropagateAtLaunch: true

  YumUpdateSSM:
    Type: AWS::SSM::Association
    Properties:
      AssociationName: YumUpdate
      Name: AWS-RunShellScript
      ScheduleExpression: "cron(0 21 ? * SUN *)"   # 1pm PST every Sunday
      Targets:
        - Key: tag:Name
          Values:
            - signal-message-sender
      Parameters:
        commands:
          - "yum update -y"
        workingDirectory:
          - /home/ec2-user
      OutputLocation:
        S3Location:
          OutputS3BucketName: !Ref DataBucket
          OutputS3KeyPrefix: ssm-output/YumUpdate

  SendWordToSignalDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: "2.2"
        description: Send a message to the specified Signal group
        parameters:
          account:
            type: String
            description: "The mobile number associated with the Signal account (in +1234567890 format)"
          groupId:
            type: String
            description: The Signal group's ID
          message:
            type: String
            description: The message to send to the Signal group
        mainSteps:
          - action: aws:runShellScript
            name: SendWordToSignal
            inputs:
              runAsUser: ec2-user
              workingDirectory: /home/ec2-user
              environment:
                XDG_DATA_HOME: /home/ec2-user/.local/share
              runCommand:
                - "signal-cli -u {{ account }} send -g {{ groupId }} -m '{{ message }}'"

Outputs:
  DataBucket:
    Value: !Ref DataBucket
  DailyThreadLambdaName:
    Value: !Ref DailyThreadLambda
  DailyThreadScheduleName:
    Value: !Ref DailyThreadSchedule
